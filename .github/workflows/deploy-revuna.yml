name: Deploy Revuna landing page

on:
  push:
    branches: [master, claude/ai-business-scaling-fbxrrb]
    paths:
      - 'ventures/revuna/site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ventures/revuna/site
      - id: deployment
        uses: actions/deploy-pages@v4
